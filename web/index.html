<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intelligent Router — Usage Dashboard</title>
  <style>
    :root { --bg:#0e1116; --card:#171b22; --fg:#e8eaed; --muted:#9aa3af;
            --accent:#5ac878; --warn:#e0a030; --bar:#2b3340; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
           font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    .wrap { max-width: 820px; margin:0 auto; padding: 32px 20px 64px; }
    h1 { font-size:1.5rem; margin:0 0 2px; }
    .sub { color:var(--muted); font-size:.85rem; margin-bottom:24px; }
    .card { background:var(--card); border:1px solid #232833; border-radius:12px;
            padding:18px 20px; margin:14px 0; }
    .gauge { height:22px; background:var(--bar); border-radius:11px; overflow:hidden; }
    .gauge > div { height:100%; background:var(--accent); width:0; transition:width .4s; }
    .nums { display:flex; gap:28px; margin-top:12px; flex-wrap:wrap; }
    .nums b { font-size:1.3rem; }
    .nums span { color:var(--muted); font-size:.8rem; display:block; }
    h2 { font-size:.95rem; color:var(--muted); margin:0 0 12px; text-transform:uppercase;
         letter-spacing:.04em; }
    .row { display:flex; align-items:center; gap:10px; margin:7px 0; }
    .row .label { width:190px; font-size:.85rem; }
    .row .track { flex:1; height:14px; background:var(--bar); border-radius:7px; overflow:hidden; }
    .row .track > div { height:100%; background:var(--accent); }
    .row .val { width:90px; text-align:right; font-variant-numeric:tabular-nums; font-size:.82rem; }
    footer { color:var(--muted); font-size:.78rem; margin-top:36px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🧭 Intelligent Router — Usage</h1>
    <div class="sub" id="meta">Loading…</div>

    <div class="card">
      <h2>Budget</h2>
      <div class="gauge"><div id="gauge"></div></div>
      <div class="nums">
        <div><b id="spent">$0</b><span>spent</span></div>
        <div><b id="remaining">$0</b><span>remaining</span></div>
        <div><b id="cap">$0</b><span>cap</span></div>
        <div><b id="calls">0</b><span>calls</span></div>
      </div>
    </div>

    <div class="card"><h2>Spend by model</h2><div id="by_model"></div></div>
    <div class="card"><h2>Spend by task type</h2><div id="by_task_type"></div></div>
    <div class="card"><h2>Spend by agent</h2><div id="by_agent"></div></div>

    <footer>Generated from router usage analytics · intelligent-router</footer>
  </div>

  <script>
    const money = v => "$" + Number(v).toFixed(4);

    function bars(elId, obj) {
      const el = document.getElementById(elId);
      const entries = Object.entries(obj || {}).sort((a, b) => b[1] - a[1]);
      if (!entries.length) { el.innerHTML = '<div class="sub">no data</div>'; return; }
      const max = Math.max(...entries.map(e => e[1])) || 1;
      el.innerHTML = entries.map(([k, v]) => `
        <div class="row">
          <div class="label">${k}</div>
          <div class="track"><div style="width:${(v / max * 100).toFixed(1)}%"></div></div>
          <div class="val">${money(v)}</div>
        </div>`).join("");
    }

    fetch("./report.json?_=" + Date.now())
      .then(r => r.json())
      .then(d => {
        document.getElementById("meta").textContent =
          `${d.calls} calls · ${d.pct_used}% of budget used`;
        document.getElementById("spent").textContent = money(d.spent);
        document.getElementById("remaining").textContent = money(d.remaining);
        document.getElementById("cap").textContent = "$" + Number(d.global_cap).toFixed(0);
        document.getElementById("calls").textContent = d.calls;
        const g = document.getElementById("gauge");
        g.style.width = Math.min(100, d.pct_used) + "%";
        if (d.pct_used > 80) g.style.background = "var(--warn)";
        bars("by_model", d.by_model);
        bars("by_task_type", d.by_task_type);
        bars("by_agent", d.by_agent);
      })
      .catch(() => {
        document.getElementById("meta").textContent =
          "No report.json yet — run: python scripts/gen_demo_data.py";
      });
  </script>
</body>
</html>
